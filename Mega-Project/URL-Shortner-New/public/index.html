<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>URL Shortener</h1>
      <form id="shorten-form">
        <div>
          <label for="url">Enter URL: </label>
          <input type="url" name="url" id="url" required />
        </div>
        <div>
          <label for="shortCode">Enter URL: </label>
          <input type="text" name="shortCode" id="shortCode" />
        </div>
        <button type="submit">Shorten</button>
      </form>

      <h2>Shortened URLs</h2>
      <ul id="shortened-urls"></ul>
    </div>

    <script>
      document
        .getElementById("shorten-form")
        .addEventListener("submit", async (event) => {
          event.preventDefault();

          const formData = new FormData(event.target);
          const url = formData.get("url");
          const shortCode = formData.get("shortCode");
          console.log(url, shortCode);

          try {
            const response = await fetch("/shorten", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url, shortCode }),
            });

            if (response.ok) {
              const data = await response.json();

              const list = document.getElementById("shortened-urls");

              // PURANA SAB DELETE
              list.innerHTML = "";

              const li = document.createElement("li");

              const shortUrl = `${window.location.origin}/${data.shortCode}`;

              li.innerHTML = `<div style="display:flex; gap:10px; align-items:center;"><a href="${shortUrl}" target="_blank">${shortUrl}</a><button class="copy-btn">Copy</button></div>`;
              list.appendChild(li);
              const copyBtn = li.querySelector(".copy-btn");

              copyBtn.addEventListener("click", async () => {
                try {
                  await navigator.clipboard.writeText(shortUrl);
                  copyBtn.textContent = "Copied!";

                  setTimeout(() => {
                    copyBtn.textContent = "Copy";
                  }, 1500);
                } catch (err) {
                  alert("Copy failed");
                }
              });

              event.target.reset();
            } else {
              const errorMessage = await response.text();
              alert(errorMessage);
            }
          } catch (error) {
            console.log(error);
          }
        });
    </script>
  </body>
</html>
